<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | TutorHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./assets/img/TutorHub logo.jpg">
    <link rel="stylesheet" href="./account.css">
    <script src="./account.js" defer></script>
</head>
<body>

    <main class="account-page">
        <a href="index.html" class="back-btn">‹</a>

        <section class="account-card">
            <img src="./assets/img/TutorHub logo.png" alt="TutorHub Logo" class="account-logo">

            <h1 id="accountTitle">Learner Account</h1>
            <p id="accountSubtitle">Sign in or create an account to continue.</p>

            <div class="account-tabs">
                <button class="tab-btn active" onclick="switchMode('login', this)">Log in</button>
                <button class="tab-btn" onclick="switchMode('signup', this)">Sign up</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="account-form active">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>

                <button type="submit">Log in</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" class="account-form">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name" required>

                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>

                <button type="submit">Create Account</button>
            </form>

            <p id="accountMessage"></p>
        </section>
    </main>

    <script src="./account.js"></script>
</body>
</html>
